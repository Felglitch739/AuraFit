<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Offline - Aurafit</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            html {
                background-color: oklch(1 0 0);
            }

            html.dark {
                background-color: oklch(0.145 0 0);
            }

            body {
                font-family:
                    'Instrument Sans',
                    system-ui,
                    -apple-system,
                    sans-serif;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                padding: 20px;
                background-color: oklch(1 0 0);
                color: oklch(0.3 0.1 240);
            }

            body.dark {
                background-color: oklch(0.145 0 0);
                color: oklch(0.9 0.05 240);
            }

            .offline-container {
                text-align: center;
                max-width: 400px;
            }

            .offline-icon {
                font-size: 64px;
                margin-bottom: 20px;
            }

            h1 {
                font-size: 28px;
                margin-bottom: 10px;
            }

            p {
                font-size: 16px;
                margin-bottom: 30px;
                opacity: 0.7;
            }

            .button {
                display: inline-block;
                padding: 12px 24px;
                background-color: #4b5563;
                color: white;
                border-radius: 8px;
                text-decoration: none;
                cursor: pointer;
                border: none;
                font-size: 16px;
                transition: opacity 0.2s;
            }

            .button:hover {
                opacity: 0.8;
            }

            .button:active {
                opacity: 0.6;
            }

            .loading {
                margin-top: 30px;
                font-size: 14px;
                opacity: 0.5;
            }
        </style>
    </head>
    <body>
        <div class="offline-container">
            <div class="offline-icon">📡</div>
            <h1>Sin Conexión</h1>
            <p>
                Parece que no estás conectado a Internet. Por favor, verifica tu
                conexión e intenta de nuevo.
            </p>
            <button class="button" onclick="window.location.href = '/'">
                Volver a Intentar
            </button>
            <div class="loading">
                Intentaremos reconectar automáticamente...
            </div>
        </div>

        <script>
            // Detectar reconexión
            window.addEventListener('online', () => {
                window.location.href = '/';
            });

            // Auto-detectar dark mode
            (function () {
                const prefersDark = window.matchMedia(
                    '(prefers-color-scheme: dark)',
                ).matches;
                if (prefersDark) {
                    document.body.classList.add('dark');
                }
            })();
        </script>
    </body>
</html>
